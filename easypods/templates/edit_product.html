{% extends 'admin_base.html' %}
{% block title %}Edit Product | EchoPods Admin{% endblock %}

{% block extra_head %}
<style>
  /* ===== PRODUCT CARD ===== */
  .product-card {
    background: rgba(30, 41, 59, 0.85);
    border: 1px solid rgba(56,189,248,0.4);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 0 40px rgba(56,189,248,0.15);
    backdrop-filter: blur(10px);
    margin: 110px auto 70px;
    animation: fadeIn 0.8s ease;
    transition: all 0.3s ease;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 40px rgba(56,189,248,0.25);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  h3 {
    color: #38bdf8;
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-shadow: 0 0 10px rgba(56,189,248,0.4);
  }

  /* ===== PRODUCT IMAGE ===== */
  .product-img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 15px;
    margin-bottom: 15px;
    border: 2px solid rgba(56,189,248,0.5);
    box-shadow: 0 0 25px rgba(56,189,248,0.25);
    transition: transform 0.3s;
  }

  .product-img:hover {
    transform: scale(1.05);
  }

  /* ===== FORM STYLING ===== */
  .form-control, .form-select {
    background: rgba(241,245,249,0.95);
    border: 1px solid rgba(56,189,248,0.4);
    border-radius: 10px;
    padding: 10px;
    color: #0f172a;
    transition: all 0.3s ease;
  }

  .form-control:focus, .form-select:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56,189,248,0.3);
  }

  label.form-label {
    font-weight: 500;
    color: #e2e8f0;
  }

  /* ===== BUTTON ===== */
  .btn-main {
    background: linear-gradient(90deg, #06b6d4, #3b82f6);
    border: none;
    padding: 12px 36px;
    color: white;
    font-weight: 600;
    border-radius: 50px;
    transition: 0.3s;
    width: 100%;
    letter-spacing: 0.5px;
  }

  .btn-main:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(56,189,248,0.4);
  }

  /* ===== ALERT ===== */
  .alert {
    background: rgba(56,189,248,0.15);
    border-color: rgba(56,189,248,0.3);
    color: #e2e8f0;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(56,189,248,0.2);
  }

  /* ===== BACK BUTTON ===== */
  a.back-btn {
    color: #38bdf8;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
    font-weight: 500;
    transition: 0.3s;
  }

  a.back-btn:hover {
    color: #60a5fa;
    text-decoration: underline;
  }
</style>
{% endblock %}

{% block content %}
<div class="product-card">


  <h3><i class="bi bi-pencil-square me-2"></i>Edit Product</h3>

  {% if product.image %}
    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-img">
    <p class="text-light small mb-3">Current Product Image</p>
  {% endif %}

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3 text-start">
      <label class="form-label">Brand</label>
      <select name="brand" class="form-select" required>
        {% for brand in brands %}
          <option value="{{ brand.id }}" {% if brand.id == product.brand.id %}selected{% endif %}>
            {{ brand.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <input type="text" name="name" class="form-control"
             value="{{ product.name }}" placeholder="Product Name" required>
    </div>

    <div class="mb-3">
      <textarea name="description" class="form-control" rows="3"
                placeholder="Product Description" required>{{ product.description }}</textarea>
    </div>

    <div class="mb-3">
      <input type="number" name="price" class="form-control"
             value="{{ product.price }}" placeholder="Price (₹)" required>
    </div>

    <div class="mb-3">
      <input type="number" name="stock" class="form-control"
             value="{{ product.stock }}" placeholder="Stock Quantity" required>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label">Update Product Image</label>
      <input type="file" name="image" accept="image/*" class="form-control">
    </div>

    <button type="submit" class="btn-main mt-2">Save Changes</button>
  </form>

  <a href="{% url 'show_products' %}" class="back-btn">← Back to Product List</a>
</div>
{% endblock %}
