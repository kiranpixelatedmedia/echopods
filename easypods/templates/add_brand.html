{% extends 'admin_base.html' %}
{% block title %}Add Brand | EchoPods Admin{% endblock %}

{% block extra_head %}
<style>
  /* ===== BRAND CARD ===== */
  .brand-card {
    background: rgba(30, 41, 59, 0.85);
    border: 1px solid rgba(56, 189, 248, 0.4);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 460px;
    margin: 100px auto 60px;
    text-align: center;
    box-shadow: 0 0 40px rgba(56,189,248,0.15);
    backdrop-filter: blur(10px);
    animation: fadeIn 0.8s ease;
    transition: all 0.3s ease;
  }

  .brand-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 45px rgba(56,189,248,0.25);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  h3 {
    color: #38bdf8;
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-shadow: 0 0 10px rgba(56,189,248,0.4);
  }

  /* ===== INPUTS ===== */
  .form-control {
    background: rgba(241, 245, 249, 0.9);
    border: 1px solid rgba(56,189,248,0.4);
    border-radius: 10px;
    padding: 10px 12px;
    color: #0f172a;
    font-weight: 500;
    transition: 0.3s ease;
  }

  .form-control:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56,189,248,0.3);
  }

  label.form-label {
    font-weight: 500;
    color: #e2e8f0;
  }

  /* ===== BUTTON ===== */
  .btn-main {
    background: linear-gradient(90deg, #06b6d4, #3b82f6);
    border: none;
    padding: 12px 36px;
    color: white;
    font-weight: 600;
    border-radius: 50px;
    transition: all 0.3s ease;
    width: 100%;
    letter-spacing: 0.5px;
  }

  .btn-main:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(56,189,248,0.4);
  }

  /* ===== ALERT ===== */
  .alert {
    background: rgba(56,189,248,0.15);
    border-color: rgba(56,189,248,0.3);
    color: #e2e8f0;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(56,189,248,0.2);
  }

  /* ===== BACK LINK ===== */
  a.back-btn {
    color: #38bdf8;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
    transition: 0.3s;
  }

  a.back-btn:hover {
    color: #60a5fa;
    text-decoration: underline;
  }

    @media (max-width: 750px) {
      .brand-card{
        size: 9vh;
      }
  }
</style>
{% endblock %}

{% block content %}
<div class="brand-card">


  <h3>Add New Brand</h3>

  <form action="{% url 'add_brand' %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="mb-3">
      <input type="text" name="name" class="form-control" placeholder="Enter Brand Name" required>
    </div>

    <div class="mb-3 text-start">
      <label class="form-label">Upload Brand Logo</label>
      <input type="file" name="image" accept="image/*" class="form-control">
    </div>

    <button type="submit" class="btn-main mt-3">Save Brand</button>
  </form>

  <a href="{% url 'admin_home' %}" class="back-btn">← Back to Dashboard</a>
</div>
{% endblock %}
